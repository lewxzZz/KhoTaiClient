.particles{

    left:0;
    width:100%;

    pointer-events:none;
    overflow:hidden;
    z-index:0;
}
.particles span{
    position:absolute;
    display:block;
    border-radius:50%;
    background:#00ffff;
    box-shadow:
        0 0 8px #00ffff,
        0 0 16px #00ffff,
        0 0 30px #00ffff;
    animation: fly linear infinite;
    filter: blur(1px);
}
.header,
.category,
.item{
    position:relative;
    z-index:1;
}

@keyframes fly{
    from{
        transform: translateX(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:
            translateX(var(--drift))
            translateY(calc(110vh + 100px));
